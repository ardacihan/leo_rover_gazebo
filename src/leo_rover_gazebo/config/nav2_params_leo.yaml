leo1/slam_toolbox:
  ros__parameters:
    use_sim_time: True
    odom_frame: "leo1/odom"
    base_frame: "leo1/base_footprint"
    map_frame: "map"
    scan_topic: "/leo1/scan"
    mode: "mapping"
    map_update_interval: 1.0

map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: ""

lifecycle_manager:
  ros__parameters:
    use_sim_time: True
    autostart: True
    node_names:
      - map_server