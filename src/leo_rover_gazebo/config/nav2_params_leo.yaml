bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: "leo1/base_link"
    odom_topic: /leo1/odom

controller_server:
  ros__parameters:
    use_sim_time: True
    controller_frequency: 20.0
    transform_tolerance: 0.5
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      RotateToGoal: {plugin: "dwb_critics::RotateToGoal", scale: 32.0}
      Oscillation: {plugin: "dwb_critics::Oscillation", scale: 1.0}
      BaseObstacle: {plugin: "dwb_critics::BaseObstacle", scale: 5.0}
      GoalAlign: {plugin: "dwb_critics::GoalAlign", scale: 24.0}
      PathAlign: {plugin: "dwb_critics::PathAlign", scale: 32.0}
      PathDist: {plugin: "dwb_critics::PathDist", scale: 32.0}
      GoalDist: {plugin: "dwb_critics::GoalDist", scale: 24.0}

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: leo1/odom
      robot_base_frame: "leo1/base_link"
      width: 10
      height: 10
      origin_x: -5.0
      origin_y: -5.0
      rolling_window: True
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /leo1/scan
          data_type: "LaserScan"
          marking: True
          clearing: True
          sensor_frame: "leo1/sensor_lidar_link"
          qos_overrides:
            scan:
              subscription:
                reliability: "best_effort"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        cost_scaling_factor: 3.0
        inflation_radius: 0.35

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: map
      robot_base_frame: "leo1/base_link"
      width: 20
      height: 20
      origin_x: -10.0
      origin_y: -10.0
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /leo1/scan
          data_type: "LaserScan"
          marking: True
          clearing: True
          sensor_frame: "leo1/sensor_lidar_link"
          qos_overrides:
            scan:
              subscription:
                reliability: "best_effort"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: True
        cost_scaling_factor: 3.0
        inflation_radius: 0.35

planner_server:
  ros__parameters:
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"

behavior_server:
  ros__parameters:
    use_sim_time: True
    local_frame: "leo1/odom"
    global_frame: map
    robot_base_frame: "leo1/base_link"

smoother_server:
  ros__parameters:
    use_sim_time: True

velocity_smoother:
  ros__parameters:
    use_sim_time: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True

lifecycle_manager:
  ros__parameters:
    use_sim_time: True
    autostart: True
    bond_timeout: 4.0
    node_names: ["map_server", "controller_server", "smoother_server", "planner_server", "behavior_server", "bt_navigator", "waypoint_follower", "velocity_smoother"]

slam_toolbox:
  ros__parameters:
    use_sim_time: True
    odom_frame: "leo1/odom"
    base_frame: "leo1/base_link"
    map_frame: "map"
    scan_topic: "/leo1/scan"
    mode: "mapping"
    resolution: 0.05
    max_laser_range: 20.0
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    minimum_travel_distance: 0.1
    minimum_travel_heading: 0.1
    map_update_interval: 1.0