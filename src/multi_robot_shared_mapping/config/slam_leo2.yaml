slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # Adjust these if your TF tree uses different names.
    odom_frame: leo2/odom
    map_frame: leo2/map
    base_frame: leo2/base_footprint
    scan_topic: /leo2/scan

    mode: mapping
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    map_update_interval: 1.0
    resolution: 0.05
    max_laser_range: 12.0
    minimum_time_interval: 0.5
    transform_timeout: 0.5
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    enable_interactive_mode: true
